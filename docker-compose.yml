version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cresko-db
    environment:
      POSTGRES_USER: cresko
      POSTGRES_PASSWORD: cresko
      POSTGRES_DB: cresko
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cresko"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
